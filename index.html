        <h2>Current Time</h2>
        <p id="time">Loading...</p>
        
        <script>
            function updateTime() {
                const now = new Date();
                const timeString = now.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                document.getElementById('time').textContent = `Current time: ${timeString}`;
            }
            setInterval(updateTime, 1000);
            updateTime();
        </script>
