<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <header-component></header-component>

    <main class="main-content">
        <br>
        <h1>Welcome to my page!</h1>
        <br>
        <p>Hi, I'm Camilo, a full-stack developer based in NYC. I specialize in building web applications using modern technologies.</p>
        <p>Feel free to explore my projects and get in touch if you have any questions or opportunities.</p>
        <p>Check out my <a href="https://github.com/fullstacknyc" target="_blank">Github</a></p>
        <p id="time">Current time in seconds: </p>
        <script>
            // Automatically display the current time in seconds using the user's local timezone and update every 1000 milliseconds
            function updateTime() {
                const now = new Date(); // Create a new Date object
                const seconds = now.getSeconds();
                document.getElementById('time').textContent = `Current time in seconds: ${seconds}`;
            }
            setInterval(updateTime, 1000);
            updateTime(); // Call the function once to initialize the time immediately
        </script>
    </main>

</body>
