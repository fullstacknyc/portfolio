<!DOCTYPE html>
<html lang="en">

<head>

    <title>Contact - Camilo's Portfolio</title>
    <link href="/styles.css" rel="stylesheet">
</head>

<body>
    <header-component></header-component>

    <main class="main-content">
        <h1>Contact Me</h1>
        <form action="https://formspree.io/f/xkgollyr" method="POST">
            <input type="text" name="name" id="name" placeholder="Your Name" required>
            <input type="email" name="email" id="email" placeholder="Your Email" required>
            <textarea name="message" id="message" placeholder="Your Message" required></textarea>
            <button type="submit">Submit</button>
        </form>
        <p id="responseMessage"></p>
        <p>Or reach out via email: <a href="mailto:jgomezval@icloud.com">jgomezval@icloud.com</a></p>
    </main>

    <footer-component></footer-component>
    <script src="/components/components.js" defer></script>
</body>

</html>
